# Shopify app config. `client_id`, `application_url` and the redirect URLs are
# filled in for you when you run `shopify app config link` / `shopify app deploy`
# with the Shopify CLI. Edit name/handle to taste.

name = "DTF Now Reprint Tracker"
handle = "dtfnow-reprint-tracker"
# client_id = "..."            # set by `shopify app config link`
# application_url = "https://your-app.vercel.app"
embedded = true

[access_scopes]
# read_orders is required to look up order value/customer for context.
scopes = "read_orders"

[auth]
redirect_urls = [
  "https://your-app.vercel.app/auth/callback",
  "https://your-app.vercel.app/auth/shopify/callback",
  "https://your-app.vercel.app/api/auth/callback"
]

[webhooks]
api_version = "2025-01"

[build]
automatically_update_urls_on_dev = true
dev_store_url = "dtfnow.myshopify.com"  # change to your dev/prod store
